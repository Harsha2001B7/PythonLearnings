name: falconview
description: "Falcon View Car Rentals - UAE Luxury Car Rental Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Google Sign In
  google_sign_in: ^6.2.2

  # UI / Assets
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/FalconViewAppLogo2.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "lib/assets/FalconViewAppLogo2.png"

flutter:
  uses-material-design: true

  assets:
    - lib/assets/falconviewLogotransparentbackground.png
    - lib/assets/google.svg
    - lib/assets/whatsapplogo.svg
    - lib/assets/instagramlogo.svg

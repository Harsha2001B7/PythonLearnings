name: luxury_car_rental
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  image_picker: ^1.1.2
  photo_view: ^0.14.0
  carousel_slider: ^4.2.1
  cached_network_image: ^3.3.1
  retrofit: any

dev_dependencies:

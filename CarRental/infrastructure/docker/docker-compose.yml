version: '3.8'
services:
  backend:
    build: 
      context: ../../apps/backend
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend:/app
    environment:
      - ENVIRONMENT=development

  web:
    build:
      context: ../../apps/web
    ports:
      - "5173:5173"
    volumes:
      - ../../apps/web:/app
      - /app/node_modules

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker — Contacts</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">JobTrack</div>
    <div class="tagline">Application tracker</div>
  </div>
  <nav class="sidebar-nav">
    <span class="nav-label">Overview</span>
    <a href="index.html" class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <span class="nav-label">Manage</span>
    <a href="companies.html" class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21V11h6v10"/></svg>
      Companies
    </a>
    <a href="applications.html" class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 0 2-2h2a2 2 0 0 0 2 2"/></svg>
      Applications
    </a>
    <a href="contacts.html" class="nav-link active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Contacts
    </a>
    <a href="interviews.html" class="nav-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Interviews
    </a>
  </nav>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <h1>Contacts</h1>
      <p>Recruiters, hiring managers, and referrals</p>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add Contact
    </button>
  </div>

  <div class="toolbar">
    <select id="filter-company" onchange="onFilter()" style="width:200px;">
      <option value="">All Companies</option>
    </select>
    <input type="text" class="search-input" placeholder="Search by name…" id="search-input" oninput="onSearch()" />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Company</th>
          <th>Email</th>
          <th>LinkedIn</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="contacts-table">
        <tr><td colspan="6"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add Contact</h2>
    <input type="hidden" id="edit-id" />

    <div class="form-group">
      <label>Company *</label>
      <select id="f-company-id">
        <option value="">Select a company…</option>
      </select>
    </div>
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Priya Nair" />
    </div>
    <div class="form-group">
      <label>Role / Title</label>
      <input type="text" id="f-role" placeholder="e.g. HR Recruiter" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="f-email" placeholder="name@company.com" />
      </div>
      <div class="form-group">
        <label>LinkedIn URL</label>
        <input type="text" id="f-linkedin" placeholder="linkedin.com/in/…" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/api.js"></script>
<script src="js/contacts.js"></script>
</body>
</html>
